<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Music</title>
  <style>
    body {
      margin: 0;
      font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #16202a;
      background: #fff;
    }
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 28px 18px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      font-weight: 700;
    }
    p {
      margin: 8px 0;
      color: #4d5a66;
    }
    code {
      padding: 2px 5px;
      border-radius: 5px;
      background: #f1f5f9;
    }
  </style>
</head>
<body>
  <main>
    <h1>Music</h1>
    <p>读取 <code>/sd/mp3</code> 或 <code>/sd/MP3</code> 下的 MP3/WAV 文件。</p>
    <p>HOME 短按播放/暂停，HOME 长按退出，左右键切歌。</p>
    <p>歌词推荐使用 UTF-8 编码的标准 <code>.lrc</code> 文件，和音频同名、同目录，例如 <code>song.mp3</code> 对应 <code>song.lrc</code>。</p>
    <p>每行格式：<code>[00:12.34]这一句歌词</code>；支持同一行多个时间标签。</p>
  </main>
</body>
</html>
