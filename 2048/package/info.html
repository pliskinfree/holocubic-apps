<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2048 信息</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fffaf2;
      --surface: #ffffff;
      --ink: #1f2933;
      --muted: #667085;
      --line: #eadfce;
      --accent: #b86b16;
      --accent-soft: #fff3e1;
      --teal: #11615c;
      --tile: #756258;
    }

    * { box-sizing: border-box; }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, #fffdf8 0%, var(--bg) 100%);
      color: var(--ink);
      font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .page {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 16px;
    }

    .top {
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .92);
      box-shadow: 0 14px 30px rgba(88, 64, 35, .08);
    }

    .icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      box-shadow: 0 8px 18px rgba(83, 61, 40, .18);
    }

    .kicker {
      margin: 0 0 3px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 750;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1;
      letter-spacing: 0;
    }

    .lang-toggle {
      min-width: 54px;
      min-height: 44px;
      padding: 0 12px;
      border: 1px solid rgba(17, 97, 92, .22);
      border-radius: 8px;
      background: #f5fffc;
      color: var(--teal);
      cursor: pointer;
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      touch-action: manipulation;
    }

    .lang-toggle:focus-visible {
      outline: 3px solid rgba(17, 97, 92, .18);
      outline-offset: 2px;
    }

    .summary {
      margin: 12px 0 0;
      color: var(--muted);
    }

    .content {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(220px, .95fr);
      gap: 12px;
      margin-top: 12px;
    }

    .panel {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .86);
    }

    h2 {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .gesture-card {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      padding: 12px;
      border-radius: 8px;
      background: #1f2933;
      color: #fffaf2;
    }

    .shake {
      display: grid;
      grid-template-columns: 32px 1fr 32px;
      gap: 6px;
      align-items: center;
    }

    .arrow,
    .phone {
      display: grid;
      place-items: center;
      border-radius: 8px;
    }

    .arrow {
      width: 32px;
      height: 40px;
      color: #fffaf2;
      border: 1px solid rgba(255, 250, 242, .25);
    }

    .phone {
      height: 48px;
      color: #1f2933;
      background: linear-gradient(180deg, #fffaf2, #eed8b8);
      animation: shakeHint 1.6s ease-in-out infinite;
    }

    .gesture-title {
      margin: 0;
      font-weight: 800;
    }

    .gesture-text {
      margin: 4px 0 0;
      color: rgba(255, 250, 242, .78);
      font-size: 13px;
    }

    .tips {
      display: grid;
      gap: 8px;
      margin: 12px 0 0;
      padding: 0;
      list-style: none;
    }

    .tips li {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      color: var(--muted);
      font-size: 13px;
    }

    .num {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 850;
      font-variant-numeric: tabular-nums;
    }

    .tips strong {
      display: block;
      color: var(--ink);
      font-size: 14px;
    }

    .meta {
      display: grid;
      gap: 10px;
    }

    .meta-item {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffaf2;
    }

    .label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .value {
      display: block;
      margin-top: 2px;
      font-size: 18px;
      font-weight: 850;
      line-height: 1.2;
      font-variant-numeric: tabular-nums;
    }

    .note {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .opensource {
      margin: 12px 2px 0;
      color: #8a94a6;
      font-size: 11px;
      line-height: 1.45;
      text-align: center;
    }

    .opensource a {
      color: inherit;
      font-weight: 700;
      text-decoration: none;
      overflow-wrap: anywhere;
    }

    .opensource a:focus-visible {
      outline: 2px solid rgba(184, 107, 22, .35);
      outline-offset: 2px;
      border-radius: 4px;
    }

    @keyframes shakeHint {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      28% { transform: translateX(-5px) rotate(-3deg); }
      56% { transform: translateX(5px) rotate(3deg); }
    }

    @media (max-width: 620px) {
      .page {
        padding: 12px;
      }

      .top {
        grid-template-columns: 56px minmax(0, 1fr) auto;
        padding: 12px;
      }

      .icon {
        width: 56px;
        height: 56px;
        border-radius: 14px;
      }

      h1 {
        font-size: 29px;
      }

      .summary {
        margin-top: 8px;
      }

      .content {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 380px) {
      .top {
        grid-template-columns: 48px minmax(0, 1fr);
      }

      .icon {
        width: 48px;
        height: 48px;
      }

      .lang-toggle {
        grid-column: 1 / -1;
        justify-self: end;
      }

      .gesture-card {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>

        lang = localStorage.getItem("app2048.info.lang") || lang;

        lang = "zh";

      if (!messages[lang]) {
        lang = "zh";

      function applyLang(nextLang) {
        var dict = messages[nextLang];
        document.documentElement.lang = nextLang === "zh" ? "zh-CN" : "en";
        document.title = dict.title;

        document.querySelectorAll("[data-i18n]").forEach(function (node) {

          var key = node.getAttribute("data-i18n-alt");

            node.setAttribute("alt", dict[key]);

          var key = node.getAttribute("data-i18n-aria-label");

            node.setAttribute("aria-label", dict[key]);

        toggle.textContent = dict.toggleText;
        toggle.setAttribute("aria-label", dict.toggleLabel);
        lang = nextLang;

        try {
          localStorage.setItem("app2048.info.lang", lang);
        } catch (err) {}
      }

      toggle.addEventListener("click", function () {
        applyLang(lang === "zh" ? "en" : "zh");
      });

      applyLang(lang);
