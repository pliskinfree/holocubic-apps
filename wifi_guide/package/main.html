<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=320,height=240,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>WiFi Setting Guide</title>
<style>
* {
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
  background: #000;
  color: #fff;
  font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
}

.screen {
  position: relative;
  width: 320px;
  height: 240px;
  overflow: hidden;
  background: #000;
}

.glow {
  position: absolute;
  left: 216px;
  top: -42px;
  width: 132px;
  height: 132px;
  border-radius: 66px;
  background: rgba(34, 211, 238, 0.16);
}

.status {
  position: absolute;
  left: 16px;
  top: 14px;
  width: 78px;
  height: 22px;
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 11px;
  color: #bff7ff;
  font-size: 11px;
  line-height: 20px;
  text-align: center;
  background: rgba(255,255,255,0.06);
}

.wifi-icon {
  position: absolute;
  left: 247px;
  top: 15px;
  width: 58px;
  height: 58px;
  object-fit: contain;
}

.title {
  position: absolute;
  left: 16px;
  top: 48px;
  width: 210px;
  height: 26px;
  font-size: 23px;
  line-height: 26px;
  font-weight: 700;
  letter-spacing: 0;
}

.subtitle {
  position: absolute;
  left: 16px;
  top: 76px;
  width: 288px;
  height: 54px;
  color: rgba(255,255,255,0.82);
  font-size: 13px;
  line-height: 18px;
}

.code-box {
  position: absolute;
  left: 16px;
  top: 134px;
  width: 288px;
  height: 46px;
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 8px;
  background: rgba(255,255,255,0.06);
}

.code-label {
  position: absolute;
  left: 12px;
  top: 7px;
  width: 90px;
  height: 14px;
  color: rgba(255,255,255,0.54);
  font-size: 10px;
  line-height: 14px;
}

.ssid {
  position: absolute;
  left: 12px;
  top: 21px;
  width: 130px;
  height: 18px;
  color: #fff;
  font-size: 14px;
  line-height: 18px;
  font-weight: 700;
}

.portal {
  position: absolute;
  left: 154px;
  top: 21px;
  width: 120px;
  height: 18px;
  color: #67e8f9;
  font-size: 14px;
  line-height: 18px;
  font-weight: 700;
  text-align: right;
}

.note {
  position: absolute;
  left: 16px;
  top: 184px;
  width: 288px;
  height: 28px;
  color: rgba(255,255,255,0.58);
  font-size: 10px;
  line-height: 14px;
}

.skip {
  position: absolute;
  left: 96px;
  top: 218px;
  width: 128px;
  height: 18px;
  border: 0;
  border-radius: 9px;
  background: #fff;
  color: #000;
  font-size: 10px;
  line-height: 18px;
  text-align: center;
  font-weight: 700;
}

.success-mark {
  position: absolute;
  left: 244px;
  top: 18px;
  width: 42px;
  height: 42px;
  border-radius: 21px;
  background: #22c55e;
  color: #fff;
  font-size: 27px;
  line-height: 42px;
  text-align: center;
  display: none;
}

.success-only {
  display: none;
}

body.success .setup-only {
  display: none;
}

body.success .success-only {
  display: block;
}

body.success .success-mark {
  display: block;
}

body.success .status {
  color: #bbf7d0;
  border-color: rgba(34,197,94,0.38);
  background: rgba(34,197,94,0.14);
}
</style>
</head>
<body>
<main class="screen">
  <div class="glow"></div>
  <div class="status setup-only">等待配网</div>
  <div class="status success-only">设备已联网</div>

  <img class="wifi-icon setup-only" src="assets/wifi-guide-ios.png" alt="" aria-hidden="true">
  <div class="success-mark" aria-hidden="true">✓</div>

  <div class="title setup-only">WiFi 配网</div>
  <div class="title success-only">设备已联网</div>

  <div class="subtitle setup-only">
    1. 手机或 PC 连接 <b>clocteck-cubic</b><br>
    2. 等待自动弹出控制网页<br>
    &nbsp;&nbsp;&nbsp;或输入 <b>192.168.18.1</b>
  </div>
  <div class="subtitle success-only">
    现在可以使用以下域名<br>
    进入设备控制页面
  </div>

  <section class="code-box setup-only">
    <div class="code-label">热点 / 地址</div>
    <div class="ssid">clocteck-cubic</div>
    <div class="portal">192.168.18.1</div>
  </section>
  <section class="code-box success-only">
    <div class="code-label">设备地址</div>
    <div class="ssid">clocteck-cubic.local</div>
    <div class="portal" id="deviceIp">192.168.0.180</div>
  </section>

  <div class="note setup-only">跳过后仍可使用本地 app；天气、股票等功能需要联网。</div>
  <div class="note success-only">设备已联网，可以使用天气、股票和应用商店等功能。</div>

  <button class="skip setup-only" type="button">按 HOME 键跳过</button>
  <button class="skip success-only" type="button">按 HOME 键返回</button>
</main>

<script>
const params = new URLSearchParams(location.search);
if (params.get("state") === "success") {
  document.body.classList.add("success");
}
const ip = params.get("ip");
if (ip) {
  document.getElementById("deviceIp").textContent = ip;
}
</script>
</body>
</html>
