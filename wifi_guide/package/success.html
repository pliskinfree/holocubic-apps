<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=320,height=240,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>success</title>
<style>
* { box-sizing: border-box; }

html,
body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
  background: #000;
  color: #f7fbff;
  font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
}

.screen {
  position: relative;
  width: 320px;
  height: 240px;
  overflow: hidden;
  background: #000;
}

.status-dot {
  position: absolute;
  left: 14px;
  top: 13px;
  width: 8px;
  height: 8px;
  border-radius: 4px;
  background: #34d399;
  box-shadow: 0 0 9px rgba(52, 211, 153, 0.9);
}

.eyebrow {
  position: absolute;
  left: 28px;
  top: 10px;
  width: 112px;
  height: 14px;
  color: #8cf2c5;
  font-size: 10px;
  line-height: 14px;
  letter-spacing: 1px;
}

.title {
  position: absolute;
  left: 14px;
  top: 29px;
  width: 190px;
  height: 28px;
  font-size: 22px;
  line-height: 28px;
  font-weight: 700;
}

.description {
  position: absolute;
  left: 14px;
  top: 61px;
  width: 292px;
  height: 30px;
  color: #9fb0be;
  font-size: 11px;
  line-height: 15px;
}

.info-card {
  position: absolute;
  left: 14px;
  top: 96px;
  width: 190px;
  height: 126px;
  border: 1px solid rgba(148, 181, 199, 0.18);
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.045);
}

.label {
  position: absolute;
  left: 10px;
  width: 48px;
  height: 16px;
  color: #718695;
  font-size: 9px;
  line-height: 16px;
}

.value {
  position: absolute;
  left: 58px;
  width: 121px;
  height: 16px;
  overflow: hidden;
  color: #edf8ff;
  font-size: 11px;
  line-height: 16px;
  text-align: right;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.wifi-label, .wifi-value { top: 17px; }
.signal-label, .signal-value { top: 42px; }
.ip-label, .ip-value { top: 67px; }
.domain-label, .domain-value { top: 92px; }

.ip-value {
  color: #67e8f9;
  font-weight: 700;
}

.domain-value {
  color: #8cf2c5;
  font-size: 10px;
}

.divider {
  position: absolute;
  left: 10px;
  width: 169px;
  height: 1px;
  background: rgba(148, 181, 199, 0.12);
}

.divider-1 { top: 39px; }
.divider-2 { top: 64px; }
.divider-3 { top: 89px; }

.signal-bars {
  position: absolute;
  left: 58px;
  top: 45px;
  width: 42px;
  height: 12px;
}

.bar {
  position: absolute;
  bottom: 0;
  width: 4px;
  border-radius: 2px 2px 0 0;
  background: #22d3ee;
}

.bar-1 { left: 0; height: 4px; }
.bar-2 { left: 7px; height: 7px; }
.bar-3 { left: 14px; height: 10px; }
.bar-4 { left: 21px; height: 12px; }
.bar.off { background: #2b414e; }

.signal-value {
  left: 107px;
  width: 72px;
}

.hint {
  position: absolute;
  left: 10px;
  top: 106px;
  width: 169px;
  height: 12px;
  color: #5f7584;
  font-size: 8px;
  line-height: 12px;
}

.qr-card {
  position: absolute;
  left: 206px;
  top: 96px;
  width: 104px;
  height: 126px;
  border: 1px solid rgba(103, 232, 249, 0.24);
  border-radius: 10px;
  background: rgba(10, 25, 34, 0.88);
}

.qr-wrap {
  position: absolute;
  left: 2px;
  top: 2px;
  width: 100px;
  height: 100px;
  padding: 12px;
  border-radius: 5px;
  background: #fff;
}

.qr-image {
  position: absolute;
  left: 12px;
  top: 12px;
  width: 76px;
  height: 76px;
  image-rendering: pixelated;
}

.qr-title {
  position: absolute;
  left: 0;
  top: 104px;
  width: 104px;
  height: 18px;
  color: #fff;
  font-size: 9px;
  font-weight: 600;
  line-height: 18px;
  text-align: center;
}
</style>
</head>
<body>
<main class="screen">
  <div class="status-dot"></div>
  <div class="eyebrow">NETWORK READY</div>
  <div class="title">配网成功</div>
  <div class="description">可以使用以下 IP / 域名进入设备控制网页</div>

  <section class="info-card" aria-label="网络信息">
    <div class="label wifi-label">WiFi</div>
    <div class="value wifi-value" id="wifiName">Home WiFi</div>
    <div class="divider divider-1"></div>

    <div class="label signal-label">信号</div>
    <div class="signal-bars" aria-hidden="true">
      <i class="bar bar-1"></i>
      <i class="bar bar-2"></i>
      <i class="bar bar-3"></i>
      <i class="bar bar-4"></i>
    </div>
    <div class="value signal-value" id="signalDb">-48 dB</div>
    <div class="divider divider-2"></div>

    <div class="label ip-label">IP</div>
    <div class="value ip-value" id="deviceIp">192.168.0.188</div>
    <div class="divider divider-3"></div>

    <div class="label domain-label">域名</div>
    <div class="value domain-value">clocteck-cubic.local</div>
    <div class="hint">扫码可直接打开当前设备控制页面</div>
  </section>

  <section class="qr-card" aria-label="设备控制网页二维码">
    <div class="qr-wrap">
      <img class="qr-image" id="ipQr" alt="设备 IP 二维码">
    </div>
    <div class="qr-title">扫码进入控制网页</div>
  </section>
</main>

<script>
const params = new URLSearchParams(location.search);
const wifi = params.get("wifi") || params.get("ssid") || "Home WiFi";
const ip = params.get("ip") || "192.168.0.188";
const dbText = params.get("db") || "-48";
const db = Number.parseInt(dbText, 10);
const target = `http://${ip}/`;

document.getElementById("wifiName").textContent = wifi;
document.getElementById("deviceIp").textContent = ip;
document.getElementById("signalDb").textContent = `${Number.isFinite(db) ? db : -48} dB`;
document.getElementById("ipQr").src =
  `https://api.qrserver.com/v1/create-qr-code/?size=132x132&margin=0&data=${encodeURIComponent(target)}`;

const level = db >= -55 ? 4 : db >= -67 ? 3 : db >= -75 ? 2 : 1;
document.querySelectorAll(".bar").forEach((bar, index) => {
  bar.classList.toggle("off", index >= level);
});
</script>
</body>
</html>
